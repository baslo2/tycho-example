on:
  push:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: checkout test
        uses: actions/checkout@v6
      - name: Set env
        run: |
          echo "RELEASE_VERSION=$(echo ${GITHUB_REF#refs/*/} | cut -c 2-)" >> $GITHUB_ENV
      - name: Test
        run: echo $RELEASE_VERSION

  build:
    runs-on: macos-latest
    steps:

    - name: checkout
      uses: actions/checkout@v6
    - name: List files in the repository
      run: |
          ls ${{ github.workspace }}
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: check release ver
      run: echo ${{ github.ref_name }}

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.0.0
      with:
        tag_name: v7.7.7
        name: Release 7.7.7
        draft: false
        prerelease: false
        files: |
            ${{ github.workspace }}/releng/com.vogella.tycho.product/target/products/com.vogella.tycho.product-linux.gtk.x86_64.tar.gz
            ${{ github.workspace }}/releng/com.vogella.tycho.product/target/products/com.vogella.tycho.product-macosx.cocoa.x86_64.tar.gz
            ${{ github.workspace }}/releng/com.vogella.tycho.product/target/products/com.vogella.tycho.product-win32.win32.x86_64.zip

    - name: List files in the repository after build
      run: |
          ls /Users/runner/work/tycho-example/tycho-example/releng/com.vogella.tycho.product/target/products
